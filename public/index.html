<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <title>Connexion – Mon Drive Sécurisé</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      margin: 0 0 1.5rem 0;
      font-size: 1.75rem;
      font-weight: 600;
      text-align: center;
      color: #fff;
    }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .tabs button {
      flex: 1;
      padding: 0.6rem 1rem;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.95rem;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tabs button.active { color: #fff; border-bottom-color: #339af0; }
    .panel { display: none; }
    .panel.active { display: block; }
    form { margin-bottom: 1rem; }
    label {
      display: block;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #ccc;
    }
    input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      margin-top: 0.25rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
    }
    input::placeholder { color: #888; }
    input:focus { outline: none; border-color: #4dabf7; }
    button[type="submit"] {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #339af0;
      color: #fff;
    }
    button[type="submit"]:hover { background: #228be6; }
    #message { margin-top: 1rem; padding: 0.75rem; border-radius: 8px; font-size: 0.9rem; }
    #message.success { background: rgba(34, 197, 94, 0.2); color: #86efac; }
    #message.error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
    .register-only { margin-top: 0.75rem; font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mon Drive Sécurisé</h1>

    <div class="tabs">
      <button type="button" class="active" data-tab="login">Se connecter</button>
      <button type="button" data-tab="register">S'inscrire</button>
    </div>

    <div id="loginPanel" class="panel active">
      <form id="loginForm">
        <label for="login_email">Email</label>
        <input type="email" id="login_email" name="email" placeholder="vous@exemple.fr" required>
        <label for="login_password">Mot de passe <span style="color:#888;font-weight:normal">(min. 6 caractères)</span></label>
        <input type="password" id="login_password" name="password" placeholder="••••••••" minlength="6" required>
        <button type="submit">Se connecter</button>
      </form>
    </div>

    <div id="registerPanel" class="panel">
      <form id="registerForm">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="vous@exemple.fr" required>
        <label for="password">Mot de passe <span style="color:#888;font-weight:normal">(min. 6 caractères)</span></label>
        <input type="password" id="password" name="password" placeholder="••••••••" minlength="6" required>
        <label for="invite_code">Code d'invitation <span style="color:#888;font-weight:normal">(optionnel, 4 chiffres)</span></label>
        <input type="text" id="invite_code" name="invite_code" placeholder="Laissez vide si vous n'en avez pas" maxlength="4" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
        <button type="submit">S'inscrire</button>
      </form>
    </div>

    <div id="message" role="alert"></div>
  </div>

  <script>
    const messageEl = document.getElementById('message');

    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + 'Panel').classList.add('active');
        messageEl.textContent = '';
        messageEl.className = '';
      });
    });

    function goToDrive(token, email) {
      localStorage.setItem('drive_token', token);
      if (email) localStorage.setItem('drive_email', email);
      window.location.href = '/drive.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      messageEl.textContent = '';
      messageEl.className = '';
      const form = e.target;
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: form.email.value, password: form.password.value }),
        });
        const data = await res.json();
        if (res.ok) {
          goToDrive(data.token, data.user && data.user.email);
        } else {
          messageEl.textContent = data.error || 'Erreur';
          messageEl.className = 'error';
        }
      } catch (err) {
        messageEl.textContent = 'Erreur réseau : ' + err.message;
        messageEl.className = 'error';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      messageEl.textContent = '';
      messageEl.className = '';
      const form = e.target;
      const codeRaw = (form.invite_code && form.invite_code.value) ? form.invite_code.value.trim().replace(/\D/g, '').slice(0, 4) : '';
        const body = {
          email: form.email.value,
          password: form.password.value,
        };
        if (codeRaw.length === 4) body.code = codeRaw;
        try {
          const res = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
        const data = await res.json();
        if (res.ok) {
          goToDrive(data.token, data.user && data.user.email);
        } else {
          messageEl.textContent = data.error || 'Erreur';
          messageEl.className = 'error';
        }
      } catch (err) {
        messageEl.textContent = 'Erreur réseau : ' + err.message;
        messageEl.className = 'error';
      }
    });
  </script>
</body>
</html>
